name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: dedup
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: dedup.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: dedup

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --package dedup-cli --target ${{ matrix.target }}

      - name: Rename binary for release
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          dst="dedup-${{ matrix.target }}${{ runner.os == 'Windows' && '.exe' || '' }}"
          cp "$src" "$dst"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: dedup-cli-${{ matrix.target }}
          path: dedup-${{ matrix.target }}${{ runner.os == 'Windows' && '.exe' || '' }}

  build-app:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: app-${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: app

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      - name: Upload app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dedup-app-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/macos/*.app

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-cli, build-app]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
