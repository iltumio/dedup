name: Release

# Runs when the Knope "Release PR" (branch `release`) is merged into main.
# Builds every artifact, then `knope release` tags v$version, publishes the GitHub
# release with the changelog notes, and uploads the built assets.
#
# Can also be triggered manually (workflow_dispatch) to re-run a release, e.g. to
# re-publish assets for a version whose original run failed. knope derives the
# version from the versioned files on the checked-out ref.
on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-cli:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && github.head_ref == 'release')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: dedup
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: dedup.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: dedup

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --package dedup-cli --target ${{ matrix.target }}

      - name: Rename binary for release
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          dst="dedup-${{ matrix.target }}${{ runner.os == 'Windows' && '.exe' || '' }}"
          cp "$src" "$dst"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: dedup-cli-${{ matrix.target }}
          path: dedup-${{ matrix.target }}${{ runner.os == 'Windows' && '.exe' || '' }}

  build-app:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && github.head_ref == 'release')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: app-${{ matrix.target }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: app

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }}

      - name: Upload app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dedup-app-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/macos/*.app

  build-app-arch:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && github.head_ref == 'release')
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel \
            rustup \
            nodejs \
            npm \
            git \
            curl \
            wget \
            file \
            patchelf \
            webkit2gtk-4.1 \
            gtk3 \
            libappindicator-gtk3 \
            librsvg

      - name: Setup Rust
        run: |
          rustup default stable

      - name: Setup pnpm
        run: npm install -g pnpm@11.3.0

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: app

      - name: Build Tauri app
        run: pnpm tauri build --no-bundle
        working-directory: app

      - name: Package as Arch pkg
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

          # Derive the version from the (already bumped) source tree.
          VERSION=$(grep -m1 '^version' crates/dedup-core/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          SRCDIR="$GITHUB_WORKSPACE"

          mkdir -p /tmp/pkg

          # Write PKGBUILD
          cat > /tmp/pkg/PKGBUILD <<PEOF
          pkgname=dedup-app
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc='Content-addressed file deduplication tool with a desktop visualizer'
          arch=('x86_64')
          url='https://github.com/iltumio/dedup'
          license=('MIT')
          depends=('webkit2gtk-4.1' 'gtk3' 'librsvg' 'libappindicator-gtk3')

          package() {
            install -Dm755 "${SRCDIR}/target/release/dedup-app" "\$pkgdir/usr/bin/dedup-app"
            install -Dm644 "${SRCDIR}/pkg/arch/dedup.desktop" "\$pkgdir/usr/share/applications/dedup.desktop"
            install -Dm644 "${SRCDIR}/app/src-tauri/icons/icon.png" "\$pkgdir/usr/share/icons/hicolor/512x512/apps/dedup.png"
            install -Dm644 "${SRCDIR}/app/src-tauri/icons/128x128.png" "\$pkgdir/usr/share/icons/hicolor/128x128/apps/dedup.png"
            install -Dm644 "${SRCDIR}/app/src-tauri/icons/32x32.png" "\$pkgdir/usr/share/icons/hicolor/32x32/apps/dedup.png"
            install -Dm644 "${SRCDIR}/LICENSE" "\$pkgdir/usr/share/licenses/\$pkgname/LICENSE"
          }
          PEOF
          sed -i 's/^          //' /tmp/pkg/PKGBUILD

          chown -R builder:builder /tmp/pkg
          chmod -R a+rX "$GITHUB_WORKSPACE"
          cd /tmp/pkg
          su builder -c "makepkg --noextract --nodeps"

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: dedup-app-arch
          path: /tmp/pkg/*.pkg.tar.zst

  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && github.head_ref == 'release')
    needs: [build-cli, build-app, build-app-arch]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Stage release assets
        shell: bash
        run: |
          # After `merge-multiple`, the Tauri app bundles land in per-format
          # subdirs (deb/, appimage/, dmg/, nsis/, msi/, macos/) because they were
          # uploaded with multiple path globs. knope's `assets = artifacts/*`
          # expects flat files, so pull the real distributables up to the root.
          # The macOS `.app` is a directory (already shipped inside the .dmg) —
          # leaving it nested means it gets dropped here, which is what we want.
          shopt -s globstar nullglob
          mkdir staged
          # CLI binaries and the Arch package already sit at the artifacts root.
          for f in artifacts/*; do [ -f "$f" ] && mv "$f" staged/; done
          # App bundles are nested one level down, per format.
          for f in artifacts/**/*.deb artifacts/**/*.AppImage artifacts/**/*.exe \
                   artifacts/**/*.msi artifacts/**/*.dmg; do
            mv "$f" staged/
          done
          rm -rf artifacts
          mv staged artifacts
          echo "Staged release assets:"
          find artifacts -type f | sort

      - uses: knope-dev/action@v2.1.2
        with:
          version: 0.23.0

      # Tags v$version, creates the GitHub release with changelog notes, and
      # uploads everything under artifacts/* (see `assets` in knope.toml).
      - name: Publish release
        run: knope release --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
